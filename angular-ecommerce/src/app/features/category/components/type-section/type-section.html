<div class="space-y-6">

    <!-- Heading -->
    <div >
        <h2 class="text-2xl font-semibold text-gray-800 ">
            Find Your {{ category | titlecase }}
        </h2>
        <p class="text-gray-500 text-sm">
            Find the perfect laptop for work, play and everything in between.
        </p>
    </div>

    <!-- Cards -->
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6 bg-[#E5E5E5] p-6 w-100%">
    
        @for (type of types; track type.id) {
        <div class="bg-white rounded-xl shadow-sm hover:shadow-md transition cursor-pointer p-4 flex flex-col items-center text-center">
            <!-- Image -->

             
            <img [src]="type.image" [alt]="type.name" class="h-[20vh] object-contain mb-3" />

            <!-- Label -->
            <p class="text-md font-medium text-gray-700">
                {{ type.name }}
            </p>

        </div>
        }

    </div>

</div>
