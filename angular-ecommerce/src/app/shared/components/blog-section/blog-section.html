<div [class]="wrapperClass">
  <app-section-header [title]="title"></app-section-header>

  <div class="border-b border-gray-300 mb-6"></div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    @for (blog of blogs; track blog.title) {
    <div class="space-y-4">
      <div class="relative rounded-xl overflow-hidden h-45">
        <img [src]="blog.image" [alt]="blog.title" class="w-full h-full object-cover" />
        <div class="absolute inset-0 bg-blue-900/30"></div>
        <div class="absolute -left-30 -bottom-10 w-84 h-84 bg-blue-800 rounded-full"></div>

        <div class="absolute inset-0 flex items-center px-6 text-white">
          <h3 class="text-lg font-semibold leading-snug">{{ blog.title }}</h3>
        </div>
      </div>

      <div>
        <h4 class="font-semibold text-gray-800">{{ blog.footerTitle }}</h4>
        <p class="text-sm text-gray-500 mt-1">{{ blog.footerDesc }}</p>
      </div>
    </div>
    }
  </div>
</div>
