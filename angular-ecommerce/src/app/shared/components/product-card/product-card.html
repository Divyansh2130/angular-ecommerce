<div class="bg-gray-100 rounded-xl p-4 relative hover:shadow-lg transition">

    <!-- Discount badge -->
    <div class="absolute top-3 left-3 bg-orange-500 text-white text-sm px-2 py-1 rounded">
        {{ product.discount }}
        @if(product.tag){
        <span>{{ product.tag }}</span>
        }
    </div>

    <!-- Image -->
    <div class="h-40 flex items-center justify-center">
        <img [src]="product.image" alt="" class="h-[150%] w-[100%] object-contain" />
    </div>

    <!-- Title -->
    <h3 class="mt-4 text-sm font-medium text-gray-700">
        {{ product.title }}
    </h3>

    <div class="flex justify-between">
        <!-- Price -->
        <div class="mt-2 flex items-center gap-2">
            <span class="line-through text-gray-400 text-sm">
                €{{ product.originalPrice }}
            </span>
            <span class="text-red-500 font-semibold">
                €{{ product.price }}
            </span>
        </div>

        <!-- Rating -->
        <div class="mt-2 text-sm text-gray-600">
            ⭐ {{ product.rating }} ({{ product.reviews }})
        </div>
    </div>


</div>
